<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voul — Экосистема будущего</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            color: #c084fc;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            padding: 16px;
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .section-label {
            font-size: clamp(12px, 3vw, 14px);
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 2px;
        }

        .nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-link {
            background: #1a1a1a;
            border: 1px solid #8b5cf6;
            border-radius: 10px;
            padding: 10px 16px;
            color: #c4b5fd;
            text-decoration: none;
            font-size: clamp(13px, 3vw, 15px);
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 6px #6d28d944;
        }

        .nav-link:hover {
            background: #8b5cf6;
            color: #fff;
            box-shadow: 0 0 20px #8b5cf6, 0 0 40px #6d28d9;
            border-color: #a78bfa;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 500px;
            margin: 40px auto 0 auto;
        }

        .logo {
            font-size: clamp(40px, 10vw, 70px);
            font-weight: bold;
            letter-spacing: 6px;
            text-shadow: 0 0 25px #8b5cf6, 0 0 50px #6d28d9;
            animation: pulse 3s infinite ease-in-out;
        }

        .subtitle {
            font-size: clamp(16px, 4vw, 24px);
            color: #c4b5fd;
            text-align: center;
        }

        .services {
            font-size: clamp(14px, 3.5vw, 18px);
            color: #a78bfa;
            text-align: center;
            word-break: break-word;
        }

        .countdown {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .count-block {
            background: #1a1a1a;
            border: 1px solid #8b5cf6;
            border-radius: 12px;
            padding: 14px 10px;
            min-width: 65px;
            text-align: center;
            box-shadow: 0 0 12px #6d28d9;
        }

        .count-number {
            font-size: clamp(28px, 8vw, 44px);
            font-weight: bold;
            color: #e9d5ff;
            line-height: 1;
        }

        .count-label {
            font-size: clamp(10px, 2.5vw, 14px);
            color: #a78bfa;
            margin-top: 4px;
        }

        .coming-soon {
            color: #6b7280;
            margin-top: 20px;
            font-size: clamp(12px, 3vw, 16px);
            text-align: center;
        }

        @keyframes pulse {
            0%, 100% {
                text-shadow: 0 0 25px #8b5cf6, 0 0 50px #6d28d9;
            }
            50% {
                text-shadow: 0 0 40px #a78bfa, 0 0 80px #8b5cf6;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="section-label">Проекты:</div>
        <div class="nav">
            <a href="voulgsearch.html" class="nav-link">VoulGsearch</a>
            <a href="voulimess.html" class="nav-link">VouLImess</a>
            <a href="voulmes.html" class="nav-link">VoulMes</a>
            <a href="mailvoul.html" class="nav-link">maiLVoul</a>
        </div>
    </div>

    <div class="card">
        <div class="logo">VOUL</div>
        <div class="subtitle">Экосистема в чёрно-фиолетовых тонах</div>
        <div class="services">VoulMes • VouLImess • VoulGsearch • maiLVoul</div>

        <div class="countdown">
            <div class="count-block">
                <div class="count-number" id="days">00</div>
                <div class="count-label">Дней</div>
            </div>
            <div class="count-block">
                <div class="count-number" id="hours">00</div>
                <div class="count-label">Часов</div>
            </div>
            <div class="count-block">
                <div class="count-number" id="minutes">00</div>
                <div class="count-label">Минут</div>
            </div>
            <div class="count-block">
                <div class="count-number" id="seconds">00</div>
                <div class="count-label">Секунд</div>
            </div>
        </div>

        <p class="coming-soon">До запуска экосистемы Voul...</p>
    </div>

    <script>
        const launchDate = new Date("January 1, 2031 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = launchDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").textContent = String(days).padStart(2, '0');
            document.getElementById("hours").textContent = String(hours).padStart(2, '0');
            document.getElementById("minutes").textContent = String(minutes).padStart(2, '0');
            document.getElementById("seconds").textContent = String(seconds).padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
